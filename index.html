<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Hair Loss Companion Kit by Chiranjivi Notes® — An evidence-based interactive patient workbook.">
<title>Hair Loss Companion Kit — Chiranjivi Notes®</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   CHIRANJIVI NOTES® DESIGN SYSTEM v2.0
   Hair Loss Companion Kit
═══════════════════════════════════════════════════════ */

/* --- TOKENS --- */
:root {
  --ground:#0f0e0c; --paper:#f7f4ef; --paper-warm:#f0ece4; --paper-teal:#eef3f2;
  --ink:#232018; --ink-light:#4a4438; --ink-faint:#7a7068;
  --teal:#4a908a; --teal-dim:#3a706a; --teal-pale:rgba(74,144,138,0.10);
  --ochre:#c09553; --ochre-pale:rgba(192,149,83,0.12);
  --sage:#7a9e8a; --sage-pale:rgba(122,158,138,0.10);
  --slate:#6b7b8d; --slate-pale:rgba(107,123,141,0.10);
  --brick:#a05448; --brick-pale:rgba(160,84,72,0.10);
  --shadow-card:0 6px 24px rgba(35,32,24,0.07),0 2px 8px rgba(35,32,24,0.05);
  --shadow-lift:0 18px 60px rgba(15,14,12,0.16),0 4px 16px rgba(15,14,12,0.08);
  --serif:'Cormorant Garamond','Palatino Linotype',Georgia,serif;
  --body:'EB Garamond','Palatino Linotype',Georgia,serif;
  --ease:cubic-bezier(.16,1,.3,1);
  --max-w:720px; --col-w:620px;
}

/* --- RESET --- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;font-size:16px;}
body{background:var(--ground);font-family:var(--body);color:var(--ink);line-height:1.78;min-height:100vh;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");background-size:200px;pointer-events:none;z-index:9999;opacity:.35;mix-blend-mode:multiply;}
::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-track{background:var(--ground);} ::-webkit-scrollbar-thumb{background:var(--teal-dim);}

/* --- REDUCED MOTION --- */
@media (prefers-reduced-motion:reduce){*{animation-duration:0.01ms!important;transition-duration:0.01ms!important;scroll-behavior:auto!important;}}

/* ════════════════════════════════════
   SPLASH SCREEN
════════════════════════════════════ */
#cn-splash{position:fixed;inset:0;z-index:5000;background:linear-gradient(165deg,#14130f,#0f0e0c 50%,#0c0b09);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;transition:opacity .9s var(--ease),visibility .9s;}
#cn-splash.hide{opacity:0;visibility:hidden;pointer-events:none;}
.sp-mono{width:64px;height:64px;border-radius:50%;border:1px solid rgba(74,144,138,.5);display:flex;align-items:center;justify-content:center;margin:0 auto 2rem;font-family:var(--serif);font-size:1rem;color:var(--teal);position:relative;animation:spPulse 3s ease infinite;}
.sp-mono::after{content:'';position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(74,144,138,.18);}
@keyframes spPulse{0%,100%{box-shadow:0 0 0 0 rgba(74,144,138,.2);}50%{box-shadow:0 0 0 12px rgba(74,144,138,0);}}
.sp-brand{font-family:var(--serif);font-size:.58rem;letter-spacing:.42em;text-transform:uppercase;color:var(--teal);opacity:.7;margin-bottom:1.6rem;}
.sp-title{font-family:var(--serif);font-weight:300;font-size:clamp(1.8rem,5vw,2.8rem);color:var(--paper);line-height:1.2;margin-bottom:.4rem;}
.sp-title em{font-style:italic;color:var(--teal);}
.sp-meta{font-family:var(--serif);font-size:.68rem;color:var(--paper);opacity:.3;letter-spacing:.12em;margin-bottom:2.2rem;line-height:2;}
.sp-tag{font-family:var(--serif);font-style:italic;font-size:.9rem;color:var(--paper);opacity:.45;margin-bottom:2.8rem;}
.sp-track{width:160px;height:2px;background:rgba(74,144,138,.15);margin:0 auto 1.4rem;}
.sp-bar{height:2px;width:0%;background:var(--teal);transition:width 2.8s cubic-bezier(.4,0,.2,1);}
.sp-hint{font-family:var(--serif);font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--teal);opacity:.4;}

/* ════════════════════════════════════
   STICKY NAV
════════════════════════════════════ */
#cn-nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(15,14,12,.94);backdrop-filter:blur(12px);border-bottom:1px solid rgba(74,144,138,.15);padding:.6rem 1.4rem;display:flex;align-items:center;gap:.8rem;transform:translateY(-100%);transition:transform .35s ease;}
#cn-nav.show{transform:translateY(0);}
.nav-brand{font-family:var(--serif);font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;color:var(--teal);opacity:.72;flex-shrink:0;}
.nav-dots{display:flex;gap:.3rem;}
.nav-dot{width:5px;height:5px;border-radius:50%;border:1px solid rgba(74,144,138,.3);background:transparent;transition:background .2s,transform .18s;}
.nav-dot.done{background:var(--teal-dim);border-color:var(--teal-dim);}
.nav-dot.active{background:var(--teal);border-color:var(--teal);transform:scale(1.5);}
.nav-section{font-family:var(--serif);font-size:.6rem;color:var(--teal);opacity:.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;flex-shrink:0;letter-spacing:.05em;}
.nav-saved{font-family:var(--serif);font-size:.55rem;letter-spacing:.1em;color:var(--teal);opacity:0;transition:opacity .4s;flex-shrink:0;}
.nav-saved.show{opacity:.72;}
.nav-pct{font-family:var(--serif);font-size:.55rem;letter-spacing:.12em;color:var(--teal);opacity:.55;margin-left:auto;white-space:nowrap;flex-shrink:0;}

/* ════════════════════════════════════
   RESUME BANNER
════════════════════════════════════ */
#cn-resume{position:fixed;bottom:0;left:0;right:0;z-index:400;background:rgba(15,14,12,.97);backdrop-filter:blur(14px);border-top:1px solid rgba(74,144,138,.2);padding:1rem 1.4rem;display:none;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
#cn-resume.show{display:flex;}
.rb-text{font-family:var(--serif);font-size:.88rem;color:var(--paper);opacity:.75;}
.rb-text em{color:var(--teal);font-style:normal;}
.rb-btns{display:flex;gap:.6rem;}
.rb-btn{font-family:var(--serif);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;padding:.55rem 1.2rem;cursor:pointer;border:1px solid;background:transparent;transition:all .25s;min-height:44px;}
.rb-btn.primary{color:var(--teal);border-color:rgba(74,144,138,.4);}
.rb-btn.primary:hover,.rb-btn.primary:focus{background:rgba(74,144,138,.12);border-color:var(--teal);outline:2px solid var(--teal);outline-offset:2px;}
.rb-btn.dismiss{color:var(--ink-faint);border-color:rgba(122,112,104,.2);}
.rb-btn.dismiss:hover,.rb-btn.dismiss:focus{color:var(--paper);border-color:rgba(122,112,104,.4);outline:2px solid var(--teal);outline-offset:2px;}

/* ════════════════════════════════════
   SCROLL PROGRESS
════════════════════════════════════ */
#cn-prog{position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,var(--teal-dim),var(--teal));z-index:300;pointer-events:none;transition:width .08s linear;}

/* ════════════════════════════════════
   FLOATING CONTROLS
════════════════════════════════════ */
#cn-btt{position:fixed;bottom:1.2rem;right:1.2rem;z-index:150;width:44px;height:44px;border-radius:2px;border:1px solid rgba(74,144,138,.3);background:rgba(15,14,12,.9);backdrop-filter:blur(8px);color:var(--teal);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(8px);pointer-events:none;transition:opacity .35s var(--ease),transform .35s var(--ease),background .25s;}
#cn-btt.show{opacity:1;transform:translateY(0);pointer-events:auto;}
#cn-btt:hover,#cn-btt:focus{background:rgba(74,144,138,.12);border-color:var(--teal);outline:2px solid var(--teal);outline-offset:2px;}
#cn-btt svg{width:14px;height:14px;}
.cn-fs-wrap{position:fixed;bottom:4.6rem;right:1.2rem;z-index:150;display:flex;flex-direction:column;gap:.35rem;}
.cn-fs-btn{width:44px;height:44px;border-radius:2px;border:1px solid rgba(74,144,138,.28);background:rgba(15,14,12,.9);backdrop-filter:blur(8px);color:var(--teal);cursor:pointer;font-family:var(--serif);font-size:.78rem;display:flex;align-items:center;justify-content:center;transition:background .25s,border-color .25s;}
.cn-fs-btn:hover,.cn-fs-btn:focus{background:rgba(74,144,138,.12);border-color:var(--teal);outline:2px solid var(--teal);outline-offset:2px;}

/* ════════════════════════════════════
   TOAST
════════════════════════════════════ */
#cn-toast{position:fixed;bottom:3.5rem;left:50%;z-index:500;transform:translateX(-50%) translateY(16px);background:rgba(15,14,12,.96);border:1px solid rgba(74,144,138,.28);color:var(--teal);font-family:var(--serif);font-size:.68rem;letter-spacing:.1em;padding:.6rem 1.4rem;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;border-radius:1px;}
#cn-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ════════════════════════════════════
   WORKBOOK WRAPPER
════════════════════════════════════ */
#cn-workbook{max-width:var(--max-w);margin:0 auto;padding:0 1rem 8rem;perspective:1400px;}

/* ════════════════════════════════════
   COVER PAGE
════════════════════════════════════ */
.cn-cover{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:5rem 2rem;position:relative;overflow:hidden;text-align:center;}
.cn-cover::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 22% 28%,rgba(74,144,138,.12) 0%,transparent 52%),radial-gradient(ellipse at 80% 18%,rgba(192,149,83,.06) 0%,transparent 45%),linear-gradient(165deg,#14130f,#0f0e0c 45%,#0c0b09);z-index:0;}
.cover-illus{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(640px,110vw);height:min(640px,110vw);z-index:0;pointer-events:none;}
.ci-pulse{animation:ciPulse 12s ease infinite;transform-origin:center;}
.ci-rot{animation:ciRot 240s linear infinite;transform-origin:center;}
@keyframes ciPulse{0%,100%{opacity:.55;transform:scale(1);}50%{opacity:.9;transform:scale(1.035);}}
@keyframes ciRot{to{transform:rotate(360deg);}}
.cover-inner{position:relative;z-index:1;max-width:480px;}
.cover-mono{width:58px;height:58px;border-radius:50%;border:1px solid rgba(74,144,138,.5);display:flex;align-items:center;justify-content:center;margin:0 auto 2.2rem;font-family:var(--serif);font-size:1rem;color:var(--teal);position:relative;}
.cover-mono::after{content:'';position:absolute;inset:-7px;border-radius:50%;border:1px solid rgba(74,144,138,.18);}
.cover-kicker{font-family:var(--serif);font-size:.6rem;letter-spacing:.38em;text-transform:uppercase;color:var(--teal);opacity:.65;margin-bottom:1.4rem;}
.cover-h1{font-family:var(--serif);font-weight:300;font-size:clamp(2.2rem,6vw,3.4rem);color:var(--paper);line-height:1.16;margin-bottom:.5rem;letter-spacing:-.01em;}
.cover-h1 em{font-style:italic;color:var(--teal);}
.cover-sub{font-family:var(--serif);font-style:italic;font-size:.95rem;color:var(--paper);opacity:.42;margin-bottom:3rem;}
.cover-rule{width:48px;height:1px;background:linear-gradient(90deg,transparent,var(--teal),transparent);opacity:.45;margin:0 auto 2.8rem;}
.cover-epigraph{font-family:var(--serif);font-style:italic;font-size:1.02rem;color:var(--paper);opacity:.55;line-height:1.9;margin-bottom:2.8rem;}
.cover-cta{font-family:var(--serif);font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;color:var(--teal);border:1px solid rgba(74,144,138,.4);padding:.82rem 2rem;background:transparent;cursor:pointer;transition:background .4s,border-color .4s,letter-spacing .4s;}
.cover-cta:hover,.cover-cta:focus{background:rgba(74,144,138,.1);border-color:var(--teal);letter-spacing:.34em;outline:2px solid var(--teal);outline-offset:3px;}

/* ════════════════════════════════════
   CHAPTER HEADER
════════════════════════════════════ */
.cn-chapter{min-height:96vh;display:flex;align-items:center;padding:5rem 3rem;position:relative;overflow:hidden;--co:#4a908a;}
.cn-chapter::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 28% 50%,color-mix(in srgb,var(--co) 9%,transparent) 0%,transparent 62%),radial-gradient(ellipse at 88% 14%,color-mix(in srgb,var(--co) 5%,transparent) 0%,transparent 50%);}
.cn-chapter::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--co) 45%,transparent),transparent);}
.ch-illus{position:absolute;right:-4%;top:50%;transform:translateY(-50%);width:min(46vw,460px);height:min(46vw,460px);opacity:.42;pointer-events:none;z-index:0;}
@media(max-width:760px){.ch-illus{width:78vw;height:78vw;right:50%;top:14%;transform:translate(50%,0);opacity:.26;}}
.ch-inner{position:relative;z-index:1;max-width:var(--col-w);}
.ch-icon{font-size:1.2rem;color:var(--co);opacity:.65;margin-bottom:1.4rem;display:block;}
.ch-kicker{font-family:var(--serif);font-size:.58rem;letter-spacing:.36em;text-transform:uppercase;color:var(--co);opacity:.65;display:block;margin-bottom:.6rem;}
.ch-title{font-family:var(--serif);font-weight:300;font-size:clamp(1.8rem,4.5vw,2.8rem);color:var(--paper);line-height:1.18;margin-bottom:.8rem;}
.ch-desc{font-family:var(--serif);font-style:italic;font-size:1rem;color:var(--paper);opacity:.42;line-height:1.7;max-width:30em;}
.ch-rule{width:40px;height:1px;margin:1.8rem 0 0;background:linear-gradient(90deg,var(--co),transparent);opacity:.5;}

/* ════════════════════════════════════
   SECTION DIVIDER
════════════════════════════════════ */
.cn-div{display:flex;align-items:center;justify-content:center;padding:2.2rem 0;opacity:0;transform:translateY(10px) scale(.96);transition:opacity .7s var(--ease),transform .7s var(--ease);}
.cn-div.vis{opacity:.85;transform:translateY(0) scale(1);}

/* ════════════════════════════════════
   PULL QUOTE
════════════════════════════════════ */
.cn-pull{min-height:55vh;display:flex;align-items:center;justify-content:center;padding:5rem 3rem;opacity:0;transform:translateY(18px);transition:opacity .7s var(--ease),transform .7s var(--ease);}
.cn-pull.vis{opacity:1;transform:translateY(0);}
.cn-pull.dark{background:transparent;}
.cn-pull.light{background:var(--paper-warm);}
.pull-inner{max-width:480px;text-align:center;}
.pull-qm{font-family:var(--serif);font-size:4rem;color:var(--teal);opacity:.25;line-height:1;display:block;margin-bottom:-1rem;}
.pull-diamonds{color:var(--teal);opacity:.35;font-size:.7rem;display:block;margin-bottom:1.4rem;letter-spacing:.4em;}
.pull-text{font-family:var(--serif);font-style:italic;font-weight:300;font-size:clamp(1.2rem,3vw,1.65rem);color:var(--paper);line-height:1.55;}
.cn-pull.light .pull-text{color:var(--ink);}

/* ════════════════════════════════════
   BASE CARD
════════════════════════════════════ */
.cn-card{background:var(--paper);padding:3rem 3.5rem;margin-bottom:2.5rem;position:relative;box-shadow:var(--shadow-card);opacity:0;transform:translateY(28px) rotateX(2deg) scale(.985);transform-origin:top center;transition:opacity .7s var(--ease),transform .7s var(--ease),box-shadow .5s var(--ease);}
.cn-card.vis{opacity:1;transform:translateY(0) rotateX(0) scale(1);box-shadow:var(--shadow-lift);}
/* accent stripe */
.cn-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal) 0%,transparent 100%);opacity:.55;}
.cn-card.acc-ochre::before{background:linear-gradient(90deg,var(--ochre) 0%,transparent 100%);}
.cn-card.acc-sage::before{background:linear-gradient(90deg,var(--sage) 0%,transparent 100%);}
.cn-card.acc-slate::before{background:linear-gradient(90deg,var(--slate) 0%,transparent 100%);}
.cn-card.acc-brick::before{background:linear-gradient(90deg,var(--brick) 0%,transparent 100%);}
/* footer branding */
.cn-card::after{content:'Chiranjivi Notes␀ae2␀b72Hair Loss Companion Kit2␀b72v2.02␀b72␀a9 20262␀b72For personal educational use only';display:block;margin-top:2rem;padding-top:.8rem;border-top:1px solid rgba(74,144,138,.1);font-family:var(--serif);font-size:.55rem;letter-spacing:.14em;color:var(--teal);opacity:.28;text-align:center;}
/* card touched indicator */
.cn-card.touched .card-tick{display:flex;}
.card-tick{position:absolute;top:1.35rem;left:1.55rem;width:21px;height:21px;border-radius:50%;background:var(--teal);color:var(--paper);display:none;align-items:center;justify-content:center;font-size:.6rem;pointer-events:none;aria-hidden:true;}
/* card variants */
.cn-card.warm{background:var(--paper-warm);}
.cn-card.teal-bg{background:var(--paper-teal);}
/* card header elements */
.card-badge{position:absolute;top:1.4rem;right:1.8rem;font-family:var(--serif);font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--teal-dim);opacity:.6;}
.card-kicker{font-family:var(--serif);font-size:.57rem;letter-spacing:.32em;text-transform:uppercase;color:var(--teal);opacity:.6;display:block;margin-bottom:.5rem;}
.card-kicker.ochre{color:var(--ochre);} .card-kicker.sage{color:var(--sage);} .card-kicker.slate{color:var(--slate);} .card-kicker.brick{color:var(--brick);}
.card-title{font-family:var(--serif);font-weight:400;font-size:clamp(1.4rem,3vw,1.9rem);color:var(--ink);line-height:1.2;margin-bottom:.3rem;}
.card-sub{font-family:var(--serif);font-style:italic;font-size:.95rem;color:var(--ink-light);opacity:.72;margin-bottom:1rem;line-height:1.65;}
.card-rule{border:none;border-top:1px solid rgba(74,144,138,.18);margin:1rem 0 1.4rem;}
.card-rule.ochre{border-top-color:rgba(192,149,83,.2);} .card-rule.sage{border-top-color:rgba(122,158,138,.2);} .card-rule.slate{border-top-color:rgba(107,123,141,.2);} .card-rule.brick{border-top-color:rgba(160,84,72,.2);}
.card-closer{font-family:var(--serif);font-style:italic;font-size:.9rem;color:var(--ink-light);opacity:.55;margin-top:1.4rem;padding-top:1rem;border-top:1px solid rgba(74,144,138,.1);line-height:1.7;}

/* ════════════════════════════════════
   CONTENT BLOCK COMPONENTS
════════════════════════════════════ */
/* Body text */
.cn-body{font-size:1.02rem;color:var(--ink);line-height:1.82;margin-bottom:.9rem;}
.cn-body:last-child{margin-bottom:0;}
/* Subsection heading */
.cn-sub{font-family:var(--serif);font-weight:500;font-size:1rem;color:var(--ink);margin:1.4rem 0 .4rem;}

/* DoctorPearl */
.cn-pearl{border:1px solid rgba(192,149,83,.3);background:rgba(192,149,83,.06);padding:1.2rem 1.4rem;margin:1.2rem 0;position:relative;}
.cn-pearl::before{content:'»6';position:absolute;top:-.55rem;left:1rem;background:var(--paper);padding:0 .3rem;color:var(--ochre);font-size:.6rem;opacity:.8;}
.pearl-lbl{font-family:var(--serif);font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;color:var(--ochre);opacity:.8;display:block;margin-bottom:.4rem;}
.pearl-body{font-size:.93rem;color:var(--ink-light);line-height:1.72;font-style:italic;}
/* warm-card variant: white background for ::before */
.warm .cn-pearl::before,.warm .cn-note::before{background:var(--paper-warm);}

/* EvidenceBox */
.cn-evidence{border:1px solid rgba(122,158,138,.25);background:var(--sage-pale);padding:1.2rem 1.4rem;margin:1.2rem 0;}
.ev-lbl{font-family:var(--serif);font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;color:var(--sage);opacity:.8;display:block;margin-bottom:.4rem;}

/* SafetyAlert */
.cn-safety{border:1px solid rgba(160,84,72,.22);background:var(--brick-pale);padding:1.2rem 1.4rem;margin:1.2rem 0;}
.sa-lbl{font-family:var(--serif);font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;color:var(--brick);opacity:.8;display:block;margin-bottom:.4rem;}

/* ReassuranceBox */
.cn-reassure{background:var(--ochre-pale);border:1px solid rgba(192,149,83,.25);padding:1.2rem 1.4rem;margin:1.2rem 0;text-align:center;}
.cn-reassure p{font-family:var(--serif);font-style:italic;font-size:1.05rem;color:var(--ink);line-height:1.72;}

/* CalloutBox */
.cn-callout{background:var(--teal-pale);border-left:3px solid var(--teal);padding:1.1rem 1.3rem;margin:1.2rem 0;}
.cn-callout.ochre{background:var(--ochre-pale);border-left-color:var(--ochre);}
.cn-callout.sage{background:var(--sage-pale);border-left-color:var(--sage);}
.cn-callout.brick{background:var(--brick-pale);border-left-color:var(--brick);}
.cn-callout.slate{background:var(--slate-pale);border-left-color:var(--slate);}
.cl-lbl{font-family:var(--serif);font-size:.56rem;letter-spacing:.3em;text-transform:uppercase;color:var(--teal);opacity:.8;display:block;margin-bottom:.35rem;}
.cn-callout.ochre .cl-lbl{color:var(--ochre);} .cn-callout.sage .cl-lbl{color:var(--sage);} .cn-callout.brick .cl-lbl{color:var(--brick);} .cn-callout.slate .cl-lbl{color:var(--slate);}
.cl-body{font-size:.95rem;color:var(--ink);line-height:1.7;}

/* Note box (teal border) */
.cn-note{border:1px solid rgba(74,144,138,.22);background:rgba(74,144,138,.04);padding:1.2rem 1.4rem;margin:1.2rem 0;position:relative;}
.cn-note::before{content:'C6';position:absolute;top:-.5rem;left:1rem;background:var(--paper);padding:0 .3rem;color:var(--teal);font-size:.55rem;opacity:.6;}
.note-lbl{font-family:var(--serif);font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;color:var(--teal);opacity:.75;display:block;margin-bottom:.4rem;}
.note-body{font-size:.93rem;color:var(--ink-light);line-height:1.72;}

/* RefBox */
.cn-ref{background:rgba(74,144,138,.04);border-left:3px solid rgba(74,144,138,.3);padding:1.2rem 1.4rem;margin:1.4rem 0;}
.cn-ref.ochre{border-left-color:rgba(192,149,83,.4);background:rgba(192,149,83,.04);}
.ref-lbl{font-family:var(--serif);font-size:.54rem;letter-spacing:.3em;text-transform:uppercase;color:var(--teal);opacity:.7;display:block;margin-bottom:.5rem;}
.ref-q{font-family:var(--serif);font-style:italic;font-size:.9rem;color:var(--ink-light);margin-bottom:.5rem;line-height:1.6;}

/* Numbered list */
.cn-ol{list-style:none;counter-reset:nl;margin-bottom:.9rem;}
.cn-ol li{display:flex;align-items:baseline;gap:.65rem;margin-bottom:.72rem;counter-increment:nl;font-size:.95rem;color:var(--ink);line-height:1.7;}
.cn-ol li::before{content:counter(nl);font-family:var(--serif);font-size:.7rem;color:var(--teal);font-weight:500;min-width:1.2rem;opacity:.8;flex-shrink:0;}

/* MythVsFact (inline in InfoCard) */
.cn-myth{border:1px solid rgba(74,144,138,.22);background:rgba(74,144,138,.04);padding:1.2rem 1.4rem;margin-bottom:.8rem;position:relative;}
.cn-myth::before{content:'C6';position:absolute;top:-.5rem;left:1rem;background:var(--paper);padding:0 .3rem;color:var(--teal);font-size:.55rem;opacity:.6;}
.myth-lbl-m{font-family:var(--serif);font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;color:var(--brick);opacity:.8;display:block;margin-bottom:.35rem;}
.myth-lbl-f{font-family:var(--serif);font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;color:var(--sage);opacity:.8;display:block;margin:.5rem 0 .35rem;}
.myth-text{font-size:.93rem;color:var(--ink-light);line-height:1.72;}
.myth-text.italic{font-style:italic;}

/* Glossary */
.cn-gloss-item{margin-bottom:1.2rem;}
.gloss-w{font-family:var(--serif);font-weight:500;font-size:1rem;color:var(--teal);margin-bottom:.2rem;}
.gloss-d{font-size:.93rem;color:var(--ink);line-height:1.72;}
.gloss-hr{border:none;border-top:1px solid rgba(74,144,138,.1);margin:.6rem 0;}

/* ════════════════════════════════════
   FORM COMPONENTS
════════════════════════════════════ */
.f-group{margin-bottom:1rem;}
.f-label{font-family:var(--serif);font-size:.78rem;color:var(--ink-light);opacity:.75;display:block;margin-bottom:.25rem;}
.f-input{width:100%;border:none;border-bottom:1.5px solid rgba(74,144,138,.2);background:transparent;font-family:var(--body);font-size:.95rem;color:var(--ink);padding:.4rem 0;outline:none;min-height:44px;}
.f-input:focus{border-bottom-color:var(--teal);box-shadow:0 2px 0 rgba(74,144,138,.12);}
.f-area{width:100%;border:none;border-bottom:1.5px solid rgba(74,144,138,.2);background:transparent;font-family:var(--body);font-size:.95rem;color:var(--ink);padding:.5rem 0;outline:none;resize:vertical;min-height:4rem;line-height:1.65;}
.f-area.lg{min-height:7rem;}
.f-area:focus{border-bottom-color:var(--teal);}
.f-input::placeholder,.f-area::placeholder{color:var(--teal-dim);opacity:.4;font-style:italic;}
.f-select{width:100%;border:none;border-bottom:1.5px solid rgba(74,144,138,.2);background:transparent;font-family:var(--body);font-size:.95rem;color:var(--ink);padding:.4rem 0;outline:none;cursor:pointer;-webkit-appearance:none;min-height:44px;}
.f-select:focus{border-bottom-color:var(--teal);}
.f-pair{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1rem;}
.f-trio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1rem;}

/* Checklist */
.cn-chk-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin:1rem 0;}
.cn-chk-grid.col1{grid-template-columns:1fr;}
.cn-chk{display:flex;align-items:flex-start;gap:.6rem;cursor:pointer;padding:.55rem .75rem;border:1px solid rgba(74,144,138,.12);transition:background .2s,border-color .2s;}
.cn-chk:hover{background:rgba(74,144,138,.05);border-color:rgba(74,144,138,.25);}
.cn-chk input[type="checkbox"]{width:18px;height:18px;flex-shrink:0;margin-top:.12rem;accent-color:var(--teal);cursor:pointer;}
.cn-chk-lbl{font-family:var(--body);font-size:.88rem;color:var(--ink);line-height:1.5;}

/* Action plan checklist (strikethrough on check) */
.cn-action-list{list-style:none;margin:1rem 0;}
.cn-action-item{display:flex;align-items:flex-start;gap:.75rem;padding:.7rem 0;border-bottom:1px solid rgba(74,144,138,.1);}
.cn-action-item:last-child{border-bottom:none;}
.cn-action-item input[type="checkbox"]{width:18px;height:18px;flex-shrink:0;margin-top:.12rem;accent-color:var(--teal);cursor:pointer;}
.cn-action-text{font-size:.95rem;color:var(--ink);line-height:1.6;}
.cn-action-item input:checked ~ .cn-action-text{color:var(--ink-faint);text-decoration:line-through;opacity:.6;}

/* RatingSelector (pills) */
.cn-rating{display:flex;gap:.4rem;flex-wrap:wrap;margin:.6rem 0;}
.cn-rating input[type="radio"]{position:absolute;opacity:0;width:0;height:0;}
.cn-rating label{font-family:var(--serif);font-size:.82rem;color:var(--ink-light);border:1px solid rgba(74,144,138,.18);padding:.45rem .9rem;cursor:pointer;transition:all .2s;min-height:44px;display:flex;align-items:center;}
.cn-rating input:checked + label{background:var(--teal);color:var(--paper);border-color:var(--teal);}
.cn-rating label:hover{border-color:var(--teal);background:rgba(74,144,138,.07);}
.cn-rating input:focus + label{outline:2px solid var(--teal);outline-offset:2px;}

/* DataTable */
.cn-table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.88rem;}
.cn-table th{font-family:var(--serif);font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--teal);opacity:.7;padding:.5rem .75rem;border-bottom:1px solid rgba(74,144,138,.2);text-align:left;font-weight:400;}
.cn-table td{padding:.55rem .75rem;border-bottom:1px solid rgba(74,144,138,.08);vertical-align:top;}
.cn-table td input,.cn-table td textarea{width:100%;border:none;background:transparent;font-family:var(--body);font-size:.88rem;color:var(--ink);outline:none;resize:none;min-height:1.5rem;}
.cn-table td input{min-height:36px;}
.cn-table td input:focus,.cn-table td textarea:focus{background:rgba(74,144,138,.04);}
.cn-table tr:last-child td{border-bottom:none;}

/* ScoreCard */
.cn-score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:1rem;margin:1rem 0;}
.cn-score-card{border:1px solid rgba(74,144,138,.15);padding:1rem;text-align:center;background:rgba(74,144,138,.03);}
.sc-lbl{font-family:var(--serif);font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--teal);opacity:.65;display:block;margin-bottom:.6rem;}
.sc-input{width:55px;border:none;border-bottom:1.5px solid rgba(74,144,138,.25);background:transparent;font-family:var(--serif);font-size:1.6rem;color:var(--teal);text-align:center;outline:none;font-weight:300;min-height:44px;}
.sc-input:focus{border-bottom-color:var(--teal);}
.sc-max{font-family:var(--serif);font-size:.7rem;color:var(--ink-faint);opacity:.5;}

/* MonthGrid */
.cn-month-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin:1.2rem 0;}
.cn-month-card{border:1px solid rgba(74,144,138,.15);padding:1rem;background:rgba(74,144,138,.03);}
.mc-lbl{font-family:var(--serif);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--teal);opacity:.7;display:block;margin-bottom:.6rem;}

/* Timeline */
.cn-timeline{position:relative;padding-left:2rem;margin:1rem 0;}
.cn-timeline::before{content:'';position:absolute;left:.45rem;top:0;bottom:0;width:1px;background:linear-gradient(180deg,var(--teal),transparent);opacity:.25;}
.tl-item{position:relative;margin-bottom:1.4rem;}
.tl-item::before{content:'';position:absolute;left:-1.65rem;top:.45rem;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--teal);background:var(--paper);opacity:.7;}
.tl-date{font-family:var(--serif);font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);opacity:.65;display:block;margin-bottom:.3rem;}

/* PhotoGrid */
.cn-photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;margin:1rem 0;}
.cn-photo-slot{border:1.5px dashed rgba(74,144,138,.25);padding:1rem .5rem;text-align:center;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.4rem;background:rgba(74,144,138,.03);transition:background .2s,border-color .2s;}
.cn-photo-slot:hover{background:rgba(74,144,138,.07);border-color:rgba(74,144,138,.4);}
.ps-icon{font-size:1.2rem;opacity:.35;}
.ps-lbl{font-family:var(--serif);font-size:.7rem;color:var(--teal-dim);opacity:.7;letter-spacing:.08em;}

/* MilestoneRow */
.cn-milestone-row{display:flex;gap:.7rem;flex-wrap:wrap;margin:1rem 0;}
.cn-milestone{display:flex;flex-direction:column;align-items:center;gap:.35rem;padding:.8rem 1rem;border:1px solid rgba(74,144,138,.18);background:rgba(74,144,138,.04);min-width:100px;text-align:center;opacity:.38;transition:opacity .4s,border-color .4s,background .4s;}
.cn-milestone.earned{opacity:1;border-color:rgba(74,144,138,.4);background:rgba(74,144,138,.08);}
.ms-icon{font-size:1.4rem;line-height:1;}
.ms-lbl{font-family:var(--serif);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);opacity:.8;line-height:1.4;}

/* ProgressSummary */
.cn-prog-summary{background:rgba(74,144,138,.05);border:1px solid rgba(74,144,138,.15);padding:1.4rem 1.6rem;margin:1.2rem 0;}
.ps-title{font-family:var(--serif);font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;color:var(--teal);opacity:.7;display:block;margin-bottom:1rem;}
.ps-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;}
.ps-item{display:flex;flex-direction:column;gap:.2rem;}
.ps-item-lbl{font-family:var(--serif);font-size:.72rem;color:var(--ink-light);opacity:.7;}
.ps-item-val{font-family:var(--serif);font-size:1.1rem;color:var(--teal);font-weight:400;}
.ps-bar-wrap{grid-column:1/-1;margin-top:.4rem;}
.ps-track{height:3px;background:rgba(74,144,138,.15);border-radius:2px;margin-top:.4rem;}
.ps-fill{height:3px;background:var(--teal);border-radius:2px;transition:width .6s var(--ease);}

/* QRGrid */
.cn-qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.8rem;margin:1rem 0;}
.cn-qr-slot{border:1px dashed rgba(74,144,138,.25);padding:1.2rem .7rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:.5rem;background:rgba(74,144,138,.03);}
.qr-box{width:60px;height:60px;border:1px solid rgba(74,144,138,.2);background:rgba(74,144,138,.05);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:.55rem;color:var(--teal);opacity:.5;letter-spacing:.08em;text-align:center;line-height:1.4;}
.qr-lbl{font-family:var(--serif);font-size:.65rem;color:var(--teal-dim);opacity:.7;letter-spacing:.06em;}
.qr-desc{font-family:var(--serif);font-size:.65rem;color:var(--ink-faint);opacity:.55;font-style:italic;}

/* Letter / Journal paper */
.cn-letter{background:var(--paper-warm);border:1px solid rgba(192,149,83,.2);padding:2.5rem 3rem;position:relative;}
.cn-letter::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--ochre) 0%,transparent 100%);opacity:.45;}

/* Consult card */
.cn-consult-card{border:1.5px solid rgba(74,144,138,.22);padding:1.8rem;margin:1.2rem 0;background:var(--paper-warm);position:relative;}
.cn-consult-card::before{content:'¸2';position:absolute;top:-.6rem;right:1.2rem;font-size:.7rem;color:var(--teal-dim);opacity:.5;background:var(--paper-warm);padding:0 .2rem;}
.cn-consult-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;}
.cz-lbl{font-family:var(--serif);font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--teal-dim);opacity:.7;}

/* Action button */
.cn-btn{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--serif);font-size:.65rem;letter-spacing:.24em;text-transform:uppercase;color:var(--teal);border:1px solid rgba(74,144,138,.3);padding:.78rem 1.7rem;background:transparent;cursor:pointer;transition:background .3s,border-color .3s;margin:.35rem .35rem 0 0;min-height:44px;}
.cn-btn:hover,.cn-btn:focus{background:rgba(74,144,138,.08);border-color:var(--teal);outline:2px solid var(--teal);outline-offset:2px;}
.cn-btn.reset{color:var(--ink-faint);border-color:rgba(122,112,104,.2);font-size:.58rem;}
.cn-btn.reset:hover,.cn-btn.reset:focus{color:var(--brick);border-color:var(--brick);background:var(--brick-pale);}

/* ════════════════════════════════════
   ECOSYSTEM + CLOSING
════════════════════════════════════ */
.cn-ecosystem{padding:3.5rem;margin-bottom:2.5rem;border:1px solid rgba(74,144,138,.15);position:relative;opacity:0;transform:translateY(18px);transition:opacity .55s ease,transform .55s ease;}
.cn-ecosystem.vis{opacity:1;transform:translateY(0);}
.cn-ecosystem::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),transparent);opacity:.55;}
.eco-title{font-family:var(--serif);font-weight:300;font-size:1.65rem;color:var(--paper);margin-bottom:.3rem;}
.eco-sub{font-family:var(--serif);font-style:italic;font-size:.9rem;color:var(--paper);opacity:.38;margin-bottom:1.6rem;line-height:1.65;}
.eco-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:1rem 0 1.4rem;}
.eco-card{border:1px solid rgba(74,144,138,.15);padding:.95rem 1.1rem;transition:border-color .2s,background .2s;}
.eco-card:hover{border-color:rgba(74,144,138,.35);background:rgba(74,144,138,.05);}
.eco-card-t{font-family:var(--serif);font-size:.9rem;color:var(--paper);opacity:.75;display:block;margin-bottom:.22rem;}
.eco-card-d{font-size:.76rem;color:var(--teal);font-style:italic;line-height:1.4;display:block;opacity:.68;}
.cn-closing{min-height:70vh;display:flex;align-items:center;justify-content:center;padding:5rem 3rem;text-align:center;position:relative;overflow:hidden;opacity:0;transform:translateY(18px);transition:opacity .7s ease,transform .7s ease;}
.cn-closing.vis{opacity:1;transform:translateY(0);}
.cn-closing::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(74,144,138,.07),transparent 65%);}
.closing-inner{max-width:520px;position:relative;}
.closing-text{font-family:var(--serif);font-style:italic;font-size:clamp(1rem,2.5vw,1.3rem);color:var(--paper);line-height:2;opacity:.75;}
.closing-text em{opacity:1;color:var(--teal);font-style:normal;}
.closing-rule{width:40px;height:1px;background:var(--teal);opacity:.28;margin:2rem auto;}
.closing-brand{font-family:var(--serif);font-size:.62rem;letter-spacing:.32em;text-transform:uppercase;color:var(--teal);opacity:.5;}
.closing-tagline{font-family:var(--serif);font-style:italic;font-size:.72rem;color:var(--paper);opacity:.25;margin-top:.6rem;letter-spacing:.06em;}
.cn-colophon{text-align:center;padding:4rem 2rem 7rem;color:var(--paper);opacity:.3;}
.cn-colophon p{font-family:var(--serif);font-size:.7rem;letter-spacing:.16em;line-height:2.1;}

/* ════════════════════════════════════
   FOCUS STATES (global)
════════════════════════════════════ */
:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}

/* ════════════════════════════════════
   RESPONSIVE
════════════════════════════════════ */
@media(max-width:600px){
  .cn-card,.cn-ecosystem{padding:2.2rem 1.5rem 2rem;}
  .cn-chapter{padding:4.5rem 1.6rem;min-height:88vh;}
  .cn-chk-grid{grid-template-columns:1fr;gap:.3rem;}
  .f-pair,.f-trio{grid-template-columns:1fr;}
  .cn-consult-grid{grid-template-columns:1fr;}
  .eco-grid{grid-template-columns:1fr;}
  .cn-photo-grid{grid-template-columns:1fr 1fr;}
  .cn-rating label{font-size:.78rem;padding:.5rem;min-height:44px;}
  .nav-dots{display:none;}
  #cn-nav{padding:.55rem 1rem;gap:.6rem;}
  .nav-section{max-width:100px;font-size:.58rem;}
  .cn-score-grid{grid-template-columns:1fr 1fr;}
  .cn-month-grid{grid-template-columns:1fr;}
  .ps-grid{grid-template-columns:1fr 1fr;}
  .cn-milestone-row{gap:.5rem;}
  .cn-milestone{min-width:80px;padding:.6rem .7rem;}
  .cn-qr-grid{grid-template-columns:1fr 1fr;}
  .cn-letter{padding:1.8rem 1.4rem;}
  .cn-consult-card{padding:1.4rem;}
}

/* ════════════════════════════════════
   PRINT
════════════════════════════════════ */
@media print{
  *{print-color-adjust:exact;-webkit-print-color-adjust:exact;}
  body{background:white;}
  body::after,#cn-splash,#cn-resume,#cn-nav,#cn-btt,.cn-fs-wrap,#cn-toast,#cn-prog,.cn-div,.cover-illus,.ch-illus{display:none!important;}
  #cn-workbook{padding:0;perspective:none;}
  .cn-cover{min-height:auto;break-after:page;padding:3rem 2rem;}
  .cn-cover::before{background:linear-gradient(165deg,#14130f,#0c0b09);}
  .cn-chapter{min-height:auto;break-after:page;padding:3rem 2rem;}
  .cn-card,.cn-pull,.cn-ecosystem,.cn-closing{box-shadow:none;break-after:page;break-inside:avoid;margin-bottom:0;opacity:1!important;transform:none!important;}
  .cn-card::after{opacity:.5;}
  .cover-cta,.cn-btn,.card-tick{display:none!important;}
  .cn-consult-card{break-inside:avoid;background:#f8f5ef!important;}
  .cn-consult-grid{grid-template-columns:1fr 1fr;}
}

/* Low-data / battery saving */
@media (prefers-reduced-data: reduce) {
  .ci-pulse,.ci-rot,.sp-mono { animation: none !important; }
  .cn-card,.cn-pull,.cn-chapter,.cn-ecosystem,.cn-closing {
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
}
</style>
</head>

  <div class="sp-mono" aria-hidden="true">CN</div>
  <p class="sp-brand">Chiranjivi Notes®</p>
  <h1 class="sp-title">Hair Loss <em>Companion Kit</em></h1>
  <p class="sp-meta">Version 2.0 · Edition 2026 · Clinical Companion Series</p>
  <p class="sp-tag">Designed for patients. Built with evidence. Updated regularly.</p>
  <div class="sp-track" role="progressbar" aria-label="Loading" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
    <div class="sp-bar" id="sp-bar"></div>
  </div>
  <p class="sp-hint">Loading your companion…</p>
</div>

<!-- ResumeBanner Component -->
<div id="cn-resume" role="alert" aria-live="polite">
  <span class="rb-text">You have <em>saved progress</em> — continue from where you left off?</span>
  <div class="rb-btns">
    <button class="rb-btn primary" onclick="ResumeManager.resume()" aria-label="Continue from saved position">Continue</button>
    <button class="rb-btn dismiss" onclick="ResumeManager.dismiss()" aria-label="Start from the beginning">Start from top</button>
  </div>
</div>

<!-- ScrollProgressBar -->
<div id="cn-prog" role="presentation" aria-hidden="true"></div>

<!-- Toast -->
<div id="cn-toast" role="status" aria-live="polite" aria-atomic="true"></div>

<!-- BackToTop -->
<button id="cn-btt" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top">
  <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><polyline points="2,10 7,4 12,10"/></svg>

<script>
/* ═══════════════════════════════════════════════════════
   CHIRANJIVI NOTES® — WORKBOOK ENGINE v2.0
   Hair Loss Companion Kit
   Modules: AppState · StorageManager · AutoSave ·
   ProgressTracker · MilestoneEngine · ObserverEngine ·
   NavController · SplashController · ResumeManager ·
   FontController · AppEvents · Components
═══════════════════════════════════════════════════════ */

/* ── AppState ─────────────────────────────────── */
const AppState = {
  version: '2.0',
  dataKey: 'cn-hairloss-v1',
  posKey:  'cn-hairloss-pos-v1',
  fsKey:   'cn-hairloss-fs-v1',
  data: {},
  scrollPos: 0,
  fontSize: 16,
  firstInput: false,
  totalCards: 0,
  touchedCards: 0,
};

/* ── AppEvents (simple pub/sub) ───────────────── */
const AppEvents = {
  _h: {},
  on(ev, fn) { (this._h[ev] = this._h[ev] || []).push(fn); },
  emit(ev, data) { (this._h[ev] || []).forEach(fn => fn(data)); }
};

/* ── StorageManager ───────────────────────────── */
const StorageManager = {
  save(fields) {
    try {
      const payload = { version: AppState.version, saved: new Date().toISOString(), fields };
      localStorage.setItem(AppState.dataKey, JSON.stringify(payload));
      localStorage.setItem(AppState.posKey, String(Math.round(document.documentElement.scrollTop)));
    } catch(e) { /* silent fail */ }
  },
  load() {
    try {
      const raw = localStorage.getItem(AppState.dataKey);
      if (!raw) return null;
      const payload = JSON.parse(raw);
      return payload.fields || null;
    } catch(e) { return null; }
  },
  getScrollPos() {
    try { return parseInt(localStorage.getItem(AppState.posKey) || '0'); } catch(e) { return 0; }
  },
  saveFS(size) {
    try { localStorage.setItem(AppState.fsKey, String(size)); } catch(e) {}
  },
  getFS() {
    try { return parseInt(localStorage.getItem(AppState.fsKey) || '16'); } catch(e) { return 16; }
  },
  clear() {
    try { localStorage.removeItem(AppState.dataKey); localStorage.removeItem(AppState.posKey); } catch(e) {}
  }
};

/* ── AutoSave (debounced 400ms) ───────────────── */
const AutoSave = {
  _timer: null,
  schedule() {
    clearTimeout(this._timer);
    this._timer = setTimeout(() => this._run(), 400);
  },
  _run() {
    const fields = {};
    document.querySelectorAll('[data-key]').forEach(el => {
      if (el.type === 'checkbox') fields[el.dataset.key] = el.checked;
      else if (el.type === 'radio') { if (el.checked) fields[el.dataset.key] = el.value; }
      else fields[el.dataset.key] = el.value;
    });
    AppState.data = fields;
    StorageManager.save(fields);
    NavController.showSaved();
    AppEvents.emit('saved');
  },
  loadAll() {
    const fields = StorageManager.load();
    if (!fields) return;
    Object.entries(fields).forEach(([k, v]) => {
      document.querySelectorAll(`[data-key="${k}"]`).forEach(el => {
        if (el.type === 'checkbox') el.checked = !!v;
        else if (el.type === 'radio') { if (el.value === String(v)) el.checked = true; }
        else el.value = v;
      });
    });
    AppEvents.emit('loaded');
  }
};

/* ── ProgressTracker ──────────────────────────── */
const ProgressTracker = {
  update() {
    let touched = 0, total = 0;
    document.querySelectorAll('.cn-card').forEach(card => {
      total++;
      let t = false;
      card.querySelectorAll('[data-key]').forEach(el => {
        if (t) return;
        if (el.type === 'checkbox' || el.type === 'radio') { if (el.checked) t = true; }
        else if (el.value && el.value.trim()) t = true;
      });
      card.classList.toggle('touched', t);
      if (t) touched++;
    });
    AppState.totalCards = total;
    AppState.touchedCards = touched;
    const pct = total > 0 ? Math.round((touched / total) * 100) : 0;

    // Update nav
    const navPct = document.getElementById('nav-pct');
    if (navPct) navPct.textContent = pct + '% complete';

    // Update progress card
    const psEng = document.getElementById('ps-engaged');
    if (psEng) psEng.textContent = `${touched} of ${total}`;
    const psPct = document.getElementById('ps-pct');
    if (psPct) psPct.textContent = pct + '%';
    const psFill = document.getElementById('ps-fill');
    if (psFill) psFill.style.width = pct + '%';

    // Medication / consult status
    const medEl = document.querySelector('[data-key="med-dose-0"]');
    const psMeds = document.getElementById('ps-meds');
    if (psMeds && medEl) psMeds.textContent = (medEl.value && medEl.value.trim()) ? 'Recorded \u2713' : 'Pending';
    const csEl = document.querySelector('[data-key="cs-diag"]');
    const psCons = document.getElementById('ps-consult');
    if (psCons && csEl) psCons.textContent = (csEl.value && csEl.value.trim()) ? 'Completed \u2713' : 'Pending';

    MilestoneEngine.check();
    AppEvents.emit('progress', { touched, total, pct });
  }
};

/* ── MilestoneEngine ──────────────────────────── */
const MilestoneEngine = {
  milestones: [
    { id: 'ms-started',  watchKey: 'snap-name',       label: 'Journey Begun' },
    { id: 'ms-month1',   watchKey: 'shed-shedding-0', label: 'Month 1 Tracked' },
    { id: 'ms-month3',   watchKey: 'shed-shedding-2', label: '3 Months Consistent' },
    { id: 'ms-month6',   watchKey: 'shed-shedding-5', label: '6 Months Consistent' },
    { id: 'ms-meds',     watchKey: 'med-dose-0',      label: 'Treatment Logged' },
    { id: 'ms-consult',  watchKey: 'cs-diag',         label: 'Consultation Recorded' },
  ],
  check() {
    this.milestones.forEach(({ id, watchKey }) => {
      const badge = document.getElementById(id);
      if (!badge) return;
      const els = document.querySelectorAll(`[data-key="${watchKey}"]`);
      let earned = false;
      els.forEach(el => {
        if (el.type === 'radio' || el.type === 'checkbox') { if (el.checked) earned = true; }
        else if (el.value && el.value.trim()) earned = true;
      });
      badge.classList.toggle('earned', earned);
      badge.setAttribute('aria-label', badge.querySelector('.ms-lbl')?.textContent + (earned ? ', earned' : ', not yet earned'));
    });
  }
};

/* ── ObserverEngine ───────────────────────────── */
const ObserverEngine = {
  init() {
    const fadeEls = document.querySelectorAll('.cn-card,.cn-pull,.cn-chapter,.cn-ecosystem,.cn-closing,.cn-div');
    const fadeObs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('vis'); fadeObs.unobserve(e.target); } });
    }, { threshold: 0.04 });

    const sectionObs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          NavController.show();
          const n = parseInt(e.target.dataset.pgn) || 0;
          NavController.updateDots(Math.ceil(n / 10));
          const sec = e.target.dataset.section || e.target.querySelector('.ch-kicker,.card-kicker')?.textContent || '';
          NavController.setSection(sec);
        }
      });
    }, { threshold: 0.2, rootMargin: '-5% 0px -45% 0px' });

    fadeEls.forEach(el => { fadeObs.observe(el); sectionObs.observe(el); });

    const coverObs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting && e.intersectionRatio > 0.35) NavController.hide(); });
    }, { threshold: 0.35 });
    const cover = document.querySelector('.cn-cover');
    if (cover) coverObs.observe(cover);
  }
};

/* ── NavController ────────────────────────────── */
const NavController = {
  _saveTimer: null,
  show() { document.getElementById('cn-nav')?.classList.add('show'); },
  hide() { document.getElementById('cn-nav')?.classList.remove('show'); },
  showSaved() {
    const el = document.getElementById('nav-saved');
    if (!el) return;
    el.classList.add('show');
    clearTimeout(this._saveTimer);
    this._saveTimer = setTimeout(() => el.classList.remove('show'), 2000);
  },
  setSection(text) {
    const el = document.getElementById('nav-section');
    if (el) el.textContent = text;
  },
  updateDots(n) {
    document.querySelectorAll('.nav-dot').forEach(d => {
      const dn = parseInt(d.dataset.n);
      d.className = 'nav-dot' + (dn < n ? ' done' : dn === n ? ' active' : '');
    });
  },
  buildDots(count) {
    const el = document.getElementById('nav-dots');
    if (!el) return;
    el.innerHTML = Array.from({ length: count }, (_, i) =>
      `<div class="nav-dot" data-n="${i+1}" role="listitem" aria-label="Part ${i+1}"></div>`
    ).join('');
  }
};

/* ── SplashController ─────────────────────────── */
const SplashController = {
  init() {
    const bar = document.getElementById('sp-bar');
    if (bar) {
      const prog = bar.closest('[role="progressbar"]');
      setTimeout(() => {
        bar.style.width = '100%';
        if (prog) prog.setAttribute('aria-valuenow', '100');
      }, 80);
    }
    setTimeout(() => {
      WorkbookRenderer.render();
      const splash = document.getElementById('cn-splash');
      if (splash) setTimeout(() => splash.classList.add('hide'), 200);
      setTimeout(() => ResumeManager.check(), 600);
    }, 3000);
  }
};

/* ── ResumeManager ────────────────────────────── */
const ResumeManager = {
  check() {
    const pos = StorageManager.getScrollPos();
    const hasData = !!localStorage.getItem(AppState.dataKey);
    if (pos > 300 && hasData) {
      document.getElementById('cn-resume')?.classList.add('show');
    }
  },
  resume() {
    const pos = StorageManager.getScrollPos();
    window.scrollTo({ top: pos, behavior: 'smooth' });
    this.dismiss();
  },
  dismiss() {
    document.getElementById('cn-resume')?.classList.remove('show');
  }
};

/* ── FontController ───────────────────────────── */
const FontController = {
  size: 16,
  init() {
    this.size = StorageManager.getFS();
    document.documentElement.style.fontSize = this.size + 'px';
  },
  increase() { this._set(Math.min(20, this.size + 1)); },
  decrease() { this._set(Math.max(14, this.size - 1)); },
  _set(s) {
    this.size = s;
    document.documentElement.style.fontSize = s + 'px';
    StorageManager.saveFS(s);
    Toast.show(s >= 20 ? 'Maximum text size' : s <= 14 ? 'Minimum text size' : 'Text size adjusted');
  }
};

/* ── Toast ────────────────────────────────────── */
const Toast = {
  _t: null,
  show(msg, dur = 2200) {
    const el = document.getElementById('cn-toast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(this._t);
    this._t = setTimeout(() => el.classList.remove('show'), dur);
  }
};

/* ── Event listeners ──────────────────────────── */
document.addEventListener('input', e => {
  if (!AppState.firstInput) {
    AppState.firstInput = true;
    setTimeout(() => Toast.show('Your responses are saved automatically to this device', 3500), 400);
  }
  AutoSave.schedule();
});
document.addEventListener('change', () => AutoSave.schedule());

window.addEventListener('scroll', () => {
  const st = document.documentElement.scrollTop;
  const sh = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  const prog = document.getElementById('cn-prog');
  if (prog) prog.style.width = (sh > 0 ? (st / sh) * 100 : 0) + '%';
  const btt = document.getElementById('cn-btt');
  if (btt) { if (st > 300) btt.classList.add('show'); else btt.classList.remove('show'); }
  try { localStorage.setItem(AppState.posKey, String(Math.round(st))); } catch(e) {}
}, { passive: true });

AppEvents.on('saved', () => ProgressTracker.update());
AppEvents.on('loaded', () => ProgressTracker.update());

/* ═══════════════════════════════════════════════
   COMPONENT BUILDERS
═══════════════════════════════════════════════ */

/* Cover SVG illustration */
function buildCoverSVG() {
  const cx=320,cy=320;
  let rays='',strands='';
  for(let i=0;i<24;i++){const a=(i/24)*Math.PI*2;const x1=cx+Math.cos(a)*48,y1=cy+Math.sin(a)*48,x2=cx+Math.cos(a)*140,y2=cy+Math.sin(a)*140;rays+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#4a908a" stroke-width="0.5" opacity="0.18"/>`;}
  for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;const sx=cx+Math.cos(a)*30,sy=cy+Math.sin(a)*30,ex=cx+Math.cos(a+0.5)*200,ey=cy+Math.sin(a+0.5)*200,cpx=cx+Math.cos(a+0.25)*120,cpy=cy+Math.sin(a+0.25)*120;strands+=`<path d="M${sx.toFixed(1)},${sy.toFixed(1)} Q${cpx.toFixed(1)},${cpy.toFixed(1)} ${ex.toFixed(1)},${ey.toFixed(1)}" fill="none" stroke="#4a908a" stroke-width="0.8" opacity="0.22"/>`;}
  return `<div class="cover-illus" aria-hidden="true"><svg viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="cg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#4a908a" stop-opacity="0.1"/><stop offset="100%" stop-color="#4a908a" stop-opacity="0"/></radialGradient></defs><g class="ci-rot"><circle cx="${cx}" cy="${cy}" r="290" fill="none" stroke="#4a908a" stroke-width="0.4" stroke-dasharray="2 14" opacity="0.18"/><circle cx="${cx}" cy="${cy}" r="240" fill="none" stroke="#c09553" stroke-width="0.5" stroke-dasharray="1 9" opacity="0.15"/></g><g class="ci-pulse"><circle cx="${cx}" cy="${cy}" r="200" fill="none" stroke="#4a908a" stroke-width="0.5" opacity="0.13"/><circle cx="${cx}" cy="${cy}" r="155" fill="none" stroke="#7a9e8a" stroke-width="0.5" opacity="0.15"/><circle cx="${cx}" cy="${cy}" r="108" fill="none" stroke="#4a908a" stroke-width="0.6" opacity="0.2"/>${rays}${strands}<circle cx="${cx}" cy="${cy}" r="100" fill="url(#cg)"/><circle cx="${cx}" cy="${cy}" r="48" fill="none" stroke="#4a908a" stroke-width="0.7" opacity="0.38"/><circle cx="${cx}" cy="${cy}" r="3" fill="#4a908a" opacity="0.5"/></g></svg></div>`;
}
function buildChapterSVG(accent) {
  return `<div class="ch-illus" aria-hidden="true"><svg viewBox="0 0 460 460" xmlns="http://www.w3.org/2000/svg"><circle cx="230" cy="230" r="200" fill="none" stroke="${accent}" stroke-width="0.6" stroke-dasharray="3 12" opacity="0.3"/><circle cx="230" cy="230" r="160" fill="none" stroke="${accent}" stroke-width="0.5" opacity="0.18"/><circle cx="230" cy="230" r="120" fill="none" stroke="${accent}" stroke-width="0.5" stroke-dasharray="1 6" opacity="0.22"/><circle cx="230" cy="230" r="60" fill="none" stroke="${accent}" stroke-width="0.7" opacity="0.25"/><circle cx="230" cy="230" r="4" fill="${accent}" opacity="0.4"/></svg></div>`;
}

/* Structural builders */
function CoverPage({title,accentWord,subtitle,epigraph}) {

function SectionDivider() {

/* BaseCard — all content cards derive from this */
function BaseCard({id,pgn,section,badge,accent,title,sub,body,closer,variant}) {
  const accClass = accent ? `acc-${accent}` : '';
  const varClass = variant || '';
  const kickerClass = accent && ['ochre','sage','slate','brick'].includes(accent) ? accent : '';
  const ruleClass = kickerClass;
  return `<article class="cn-card ${accClass} ${varClass}" id="${id}" data-pgn="${pgn||1}" data-section="${section||''}" aria-label="${title}">
  <span class="card-tick" aria-hidden="true">\u2713</span>
  ${badge ? `<span class="card-badge" aria-label="Badge: ${badge}">${badge}</span>` : ''}

  <h2 class="card-title">${title}</h2>
  ${sub ? `<p class="card-sub">${sub}</p>` : ''}
  <hr class="card-rule ${ruleClass}" aria-hidden="true">
  ${body}
  ${closer ? `<p class="card-closer">${closer}</p>` : ''}
</article>`;
}

/* Checklist component */

  </label>`).join('');
  return `<div class="cn-chk-grid ${gridClass}" role="group" ${labelId?`aria-labelledby="${labelId}"`:''}>${html}</div>`;
}

/* RatingSelector */

/* Reflection MonthGrid (with 3 score cards) */
function ReflectionMonthGrid({prefix}) {
  const ms = ['Month 1','Month 2','Month 3','Month 4','Month 5','Month 6'];
  return `<div class="cn-month-grid">${ms.map((m,i)=>`
<div class="cn-month-card">
  <span class="mc-lbl">${m}</span>
  <div class="f-group"><label class="f-label" for="${prefix}-imp-${i}">Biggest improvement</label><textarea class="f-area" id="${prefix}-imp-${i}" data-key="${prefix}-imp-${i}" placeholder="\u2026" style="min-height:2.5rem"></textarea></div>

    // Ten Truths
    pages.push(BaseCard({id:'p-truths',pgn:51,section:'Understanding Hair Loss',badge:'Section 21',accent:'',title:'Ten Hair Loss Truths',sub:'Evidence-based principles to guide your journey.',closer:null,
      body:`<ol class="cn-ol">
<li>Most dramatic shedding is temporary \u2014 many people recover fully once the trigger is addressed.</li>
<li>Hair shedding related to telogen effluvium commonly begins around two to four months after a trigger, although timing varies between individuals.</li>
<li>Early diagnosis often helps preserve more hair \u2014 do not wait unnecessarily.</li>
<li>The correct diagnosis matters more than expensive treatments. Understand what you are treating first.</li>
<li>Scalp hair grows on average about 1\u2009cm per month, although individual rates vary. Progress requires patience.</li>
<li>Consistency beats quick fixes. Daily treatment compliance over months matters more than any single session.</li>
<li>Monthly progress is more meaningful than daily observation. Step back and compare over time.</li>
<li>Not everyone needs extensive blood tests. Your doctor will guide investigations based on your history.</li>
<li>Miracle cures deserve scepticism. No topical product or supplement grows significant hair overnight.</li>
<li>Your worth is never defined by your hair.</li>
</ol>`
    }));

    pages.push(BaseCard({id:'p-myths',pgn:52,section:'Myth vs Fact',badge:'Bonus',accent:'ochre',title:'Common Myths About Hair Loss',sub:'Misinformation about hair loss is widespread. Clear thinking is part of the treatment.',closer:null,
      body:[
        ['Washing hair too often causes hair loss.','Washing frequency does not cause hair loss. Shedding during washing consists of hairs already in the resting phase \u2014 they would have shed regardless. A clean, healthy scalp is generally beneficial.'],
        ['Cutting hair makes it grow back thicker.','Hair thickness is determined by the follicle, not shaft length. Cutting has no effect on growth rate, density, or follicle health.'],
        ['Hair loss is always permanent.','Many causes \u2014 including telogen effluvium, nutritional deficiencies, and some forms of alopecia areata \u2014 are reversible with appropriate treatment. Diagnosis determines prognosis.'],
        ['Only older men lose hair.','Hair loss affects people of all ages and sexes. Female-pattern hair loss is very common and frequently underdiagnosed.'],
        ['Oil massages and herbal remedies grow hair back.','There is no robust clinical evidence that scalp oils or herbal preparations meaningfully regrow hair. Medical treatments with proven evidence should be discussed with a dermatologist.'],
        ['If a treatment worked for my friend, it will work for me.','Hair loss has multiple causes requiring different treatments. What suits one type may be ineffective or unsuitable for another. Diagnosis first.'],

      body:`<div class="cn-timeline">
<div class="tl-item"><span class="tl-date">Weeks 1\u20134</span><p class="note-body">Treatment begins. Some treatments may be associated with an initial increase in shedding in certain individuals. This does not necessarily indicate treatment failure \u2014 discuss with your doctor if concerned.</p></div>
<div class="tl-item"><span class="tl-date">Months 2\u20133</span><p class="note-body">Shedding may begin to slow. New fine hairs may emerge. Progress is subtle at this stage and can be missed without photographs.</p></div>
<div class="tl-item"><span class="tl-date">Months 4\u20136</span><p class="note-body">Visible improvement may become apparent for some individuals. Hair density may start improving. Confidence in the treatment is often higher at this stage.</p></div>
<div class="tl-item"><span class="tl-date">Months 6\u201312</span><p class="note-body">Significant improvement may be evident. Full assessment of treatment response often happens here. Your doctor may adjust your plan based on results.</p></div>
<div class="tl-item"><span class="tl-date">12 months and beyond</span><p class="note-body">Many hair loss treatments require long-term maintenance. Stopping prematurely often leads to reversal of gains. Follow your doctor\u2019s guidance on duration.</p></div>
</div>
<div class="cn-callout"><span class="cl-lbl">Important</span><p class="cl-body">The above is a general illustration. Your timeline depends on diagnosis, treatment type, age, and biology. Only your doctor can give a personalised prognosis.</p></div>
<div class="cn-pearl"><span class="pearl-lbl">Doctor\u2019s Pearl</span><p class="pearl-body">The most common reason treatments fail is that they are stopped too early. Set a realistic review date with your doctor \u2014 usually at six months \u2014 rather than evaluating week by week.</p></div>`
    }));

      body:[
        ['Anagen','The active growth phase of the hair cycle, during which the follicle produces a hair shaft. Scalp hairs typically remain in anagen for two to six years.'],
        ['Telogen','The resting phase of the hair cycle. The follicle is not actively growing. The hair eventually sheds and the follicle re-enters anagen.'],
        ['Telogen effluvium','A common form of diffuse hair shedding in which a significant number of follicles shift prematurely into the resting phase, usually triggered by a physical or emotional stressor. Shedding commonly begins around two to four months after the trigger, although timing varies.'],
        ['Follicle miniaturisation','A gradual shrinking of hair follicles over time, producing progressively finer and shorter hairs. Central to androgenetic alopecia.'],
        ['Androgenetic alopecia','The most common cause of hair loss in both men and women, caused by genetic sensitivity of hair follicles to androgens. Also called male-pattern or female-pattern hair loss.'],
        ['Alopecia areata','An autoimmune condition in which the immune system attacks hair follicles, causing patchy hair loss on the scalp, beard, or elsewhere.'],
        ['Ferritin','A protein that stores iron in the body. Low ferritin levels may contribute to hair shedding in some individuals. Interpretation requires clinical context.'],
        ['PRP (Platelet-Rich Plasma)','A procedure using a concentrated preparation of the patient\u2019s own platelets, injected into the scalp. Evidence is emerging but variable.'],
        ['Trichoscopy','A non-invasive technique using dermoscopy to examine the scalp and hair at magnification, helping diagnose different hair loss types without biopsy.'],
        ['Minoxidil','A topical or oral medication used to promote hair growth and slow hair loss. One of the few treatments with robust clinical evidence. Requires consistent long-term use.'],
        ['Finasteride / Dutasteride','Prescription oral medications that inhibit conversion of testosterone to DHT, primarily used in androgenetic alopecia. Require medical supervision.'],

    // Letter to Future Self
    pages.push(BaseCard({id:'p-letter',pgn:57,section:'A Letter to My Future Self',badge:'Final Reflection',accent:'ochre',title:'A Letter to My Future Self',sub:'Write this whenever you are ready. It may be on day one, or after several months.',closer:null,
      body:`<p class="cn-body">Many people navigating hair loss carry quiet fears about the future. A letter written today \u2014 honestly, without editing \u2014 becomes a record that a future version of you will be grateful to read.</p>
<div class="cn-letter">
<p style="font-family:var(--serif);font-style:italic;font-size:.78rem;color:var(--ink-faint);margin-bottom:1.4rem;opacity:.65">To myself, written on <input type="date" data-key="letter-date" aria-label="Letter date" style="border:none;border-bottom:1px solid rgba(74,144,138,.2);background:transparent;font-family:var(--serif);font-size:.78rem;color:var(--ink-light);outline:none;padding:.2rem 0;min-height:36px"></p>
<label class="f-label" for="letter-body" style="display:none">Letter to future self</label>
<textarea class="f-area lg" id="letter-body" data-key="letter-body" aria-label="Letter to my future self" placeholder="What are you afraid of right now? What do you hope for? What do you want to remember about this moment?&#10;&#10;Write freely. This page is only for you." style="min-height:18rem;border-bottom-color:rgba(74,144,138,.12);font-style:italic;font-size:1rem;line-height:2"></textarea>
<p style="font-family:var(--serif);font-style:italic;font-size:.82rem;color:var(--ink-faint);margin-top:1.4rem;opacity:.55">With care,<br><input data-key="letter-sig" class="f-input" aria-label="Your signature" placeholder="Your name" style="max-width:200px;font-style:italic;font-size:.9rem;display:inline-block;width:auto"></p>
</div>
<div class="cn-reassure" style="margin-top:1.2rem"><p>Whatever brought you to this page \u2014 you are doing the right thing by seeking understanding.</p></div>`
    }));
    pages.push(D());

    // Ecosystem
    pages.push(EcosystemPage({cards:[
      {title:'Understanding My Fatigue',desc:'For those whose hair loss is accompanied by persistent tiredness'},
      {title:'Understanding My Stress',desc:'Chronic stress as a trigger \u2014 explored in depth'},
      {title:'Understanding My Thyroid',desc:'When thyroid function appears relevant to your hair story'},
      {title:'Understanding My Metabolic Health',desc:'For those with PCOS, insulin resistance, or metabolic factors'},
    ]}));

    pages.push(ClosingPage());


    /* Quick Start Guide */
    pages.splice(3, 0, SectionDivider(), BaseCard({id:'p-quickstart',pgn:2,section:'Introduction',badge:'Start Here',accent:'',title:'Quick Start Guide',sub:'Five steps to make the most of this companion \u2014 at your own pace.',closer:null,
      body:`<p class="cn-body">This companion works best when used consistently over months. Here is the simplest way to begin:</p>
<ol class="cn-ol">
<li><strong>Fill in your profile.</strong> Complete My Hair Journey Snapshot with your basic details, timeline of events, and main concern.</li>
<li><strong>Take baseline photographs.</strong> Six standardised photographs today \u2014 front, sides, top, crown, hairline. Same lighting and distance each month.</li>
<li><strong>Complete the checklists.</strong> Triggers, pattern, red flags. Even if unsure, tick what applies. This gives your doctor a useful summary.</li>
<li><strong>Record your current medications.</strong> Include everything \u2014 prescribed medicines, supplements, over-the-counter products.</li>
<li><strong>Return every four weeks.</strong> Update the Monthly Shedding Tracker, rate symptoms, write a brief reflection. Progress is visible only when compared over time.</li>
</ol>
<div class="cn-reassure"><p>You do not need to complete this in one sitting. Every section you fill in makes your next appointment more productive.</p></div>
<div class="cn-callout"><span class="cl-lbl">If You Only Do One Thing Today</span><p class="cl-body">Complete the Snapshot and take your baseline photographs. Everything else can follow at your own pace.</p></div>`
    }));

    /* Do Not Panic If */
    {
      const truthsIdx = pages.findIndex(p => typeof p === 'string' && p.includes('id="p-truths"'));
      if (truthsIdx >= 0) {
        pages.splice(truthsIdx + 2, 0, BaseCard({id:'p-panic',pgn:51,section:'Understanding Hair Loss',badge:'Reassurance',accent:'sage',title:'Do Not Panic If\u2026',sub:'Some experiences during a hair loss journey feel alarming but are entirely expected.',closer:null,
          body:`<p class="cn-body">The following are common sources of unnecessary distress. Understanding them often reduces anxiety more than any treatment can.</p>
${[['You notice more hairs after washing or brushing','Loose hairs in the resting phase shed regardless \u2014 they appear together because washing mobilises them simultaneously. The washing itself is not the cause.'],
   ['Shedding seems worse at certain times of year','Seasonal variation in hair shedding is well-documented. A temporary increase in autumn or spring does not necessarily indicate worsening disease.'],
   ['Your hair looks thinner when wet','Wet hair clumps together, revealing scalp beneath. This is optical, not a true change in density. Compare dry hair at the same stage each month.'],
   ['Improvement feels slow day to day','Scalp hair grows on average about 1\u2009cm per month. Monthly photographs are the only reliable way to see subtle progress.'],
   ['You find hairs on your pillow, clothes, or in the shower','Losing 50\u201310 hairs per day is within the normal range. A significant sustained increase above your personal baseline matters more than any single observation.'],
   ['Your first month of treatment seems to make shedding worse','Some treatments may be associated with a temporary increase in shedding in certain individuals. Discuss with your doctor before stopping.'],
   ['Progress feels slow compared to accounts you have read online','Individual responses to treatment vary considerably. Online accounts often represent atypical outcomes. Your doctor is the right benchmark.'],
].map(([t,b]) => '<div class="cn-evidence" style="margin-bottom:.7rem"><span class="ev-lbl">' + t + '</span><p class="note-body">' + b + '</p></div>').join('')}
<div class="cn-reassure" style="margin-top:1rem"><p>When in doubt \u2014 note it, photograph it, and bring it to your next appointment. Worry benefits from documentation, not rumination.</p></div>`
        }), SectionDivider());
      }
    }

    /* Myth Table */
    {
      const mythsIdx = pages.findIndex(p => typeof p === 'string' && p.includes('id="p-myths"'));
      if (mythsIdx >= 0) {
        pages.splice(mythsIdx + 2, 0, BaseCard({id:'p-myth-table',pgn:52,section:'Myth vs Fact',badge:'Quick Reference',accent:'ochre',title:'Myth vs Fact \u2014 At a Glance',sub:'A quick-reference summary for patients and caregivers.',closer:null,
          body:`<div style="overflow-x:auto"><table class="cn-table"><thead><tr><th scope="col">Common Belief</th><th scope="col">What the Evidence Shows</th></tr></thead><tbody>
${[['Shampoo causes baldness','Usually false. Washing frequency does not cause hair loss.'],
   ['Oiling reverses genetic hair loss','Not supported by evidence.'],
   ['Shaving makes hair grow back thicker','False. Shaving has no effect on follicle size or density.'],
   ['Every shed hair means worsening disease','False. Losing 50\u2013100 hairs per day is within the normal range.'],
   ['Supplements help everyone','Not necessarily. They address deficiencies; they do not regrow hair where none exists.'],
   ['Hair loss only affects older men','False. Hair loss affects all ages and sexes.'],
   ['Stress alone causes permanent loss','Significant stress can trigger telogen effluvium, usually reversible once the stressor resolves.'],
   ['More expensive means more effective','Not reliably. Minoxidil \u2014 one of the most evidence-backed treatments \u2014 is widely available.'],
].map(([m,f]) => '<tr><td style="font-size:.88rem;font-style:italic;color:var(--ink-light)">' + m + '</td><td style="font-size:.88rem">' + f + '</td></tr>').join('')}
</tbody></table></div>`
        }), SectionDivider());
      }
    }

    /* My Wins */
    {
      const ecoIdx = pages.findIndex(p => typeof p === 'string' && p.includes('cn-ecosystem'));
      if (ecoIdx >= 0) {
        pages.splice(ecoIdx, 0, SectionDivider(), BaseCard({id:'p-wins',pgn:58,section:'Celebrating Progress',badge:'My Wins',accent:'sage',title:'My Wins',sub:'A dedicated space for noticing what is going right.',closer:null,
          body:`<p class="cn-body">Hair loss journeys are long. Progress is slow and often invisible month to month. This page exists to record evidence that things are moving in the right direction \u2014 however small.</p>
<div class="cn-ref ochre"><span class="ref-lbl">Wins I Have Noticed</span><p class="ref-q">Reduced shedding, better adherence, a healthier habit, a successful appointment, a moment of confidence \u2014 record any positive change here.</p>
<textarea class="f-area lg" data-key="wins-list" aria-label="My wins and positive changes" placeholder="Month 1: Noticed fewer hairs on the pillow\u2026&#10;Month 2: Remembered my medication every day this week\u2026&#10;Month 3: Felt less anxious at a social event\u2026"></textarea></div>
<div class="cn-month-grid" style="margin-top:1.2rem">${['Month 1','Month 2','Month 3','Month 4','Month 5','Month 6'].map((m,i) => '<div class="cn-month-card"><span class="mc-lbl">' + m + '</span><label class="f-label" for="wins-m-' + i + '">Biggest win this month</label><textarea class="f-area" id="wins-m-' + i + '" data-key="wins-m-' + i + '" placeholder="Something that went well\u2026" style="min-height:3rem" aria-label="' + m + ' biggest win"></textarea></div>').join('')}</div>
<div class="cn-reassure" style="margin-top:1rem"><p>Progress is not always visible in the mirror. Sometimes the win is simply showing up for yourself again today.</p></div>`
        }));
      }
    }


    return pages;
  }
};

/* ── Global helpers ───────────────────────────── */
function confirmReset() {
  if (confirm('This will clear all your responses from this device. Are you sure?')) {
    StorageManager.clear();
    AppState.firstInput = false;
    Toast.show('Responses cleared \u2014 refreshing\u2026', 1800);
    setTimeout(() => WorkbookRenderer.render(), 1800);
  }
}

/* ── Boot ─────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  FontController.init();
  SplashController.init();
});

/* ExportManager */
const ExportManager = {
  exportText() {
    const fields = StorageManager.load() || {};
    const SEP = '─'.repeat(55);
    const lines = [
      'CHIRANJIVI NOTES® — Hair Loss Companion Kit',
      'Data Export — ' + new Date().toLocaleDateString(),
      SEP, ''
    ];
    const map = {
      'snap-name':'Name','snap-age':'Age','snap-sex':'Sex','snap-occ':'Occupation',
      'snap-date':'Symptoms first noticed','snap-diet':'Diet',
      'snap-concern':'Main concern','snap-fam':'Family history',
      'snap-med':'Medical conditions','snap-meds':'Medications',
      'cs-diag':'Diagnosis','cs-sym':'Symptoms','cs-timeline':'Timeline',
      'cs-meds':'Medications (consult)','cs-inv':'Investigations',
      'cs-se':'Side effects','cs-concerns':'Top concerns','cs-followup':'Follow-up date',
      'cp-worry':'Pre-consult worry','cp-changes':'Changes noticed',
      'fq-next':'Questions for next visit','fq-explain':'Things to clarify',
      'buy-notes':'Products under consideration',
      'notes-1':'Notes 1','notes-2':'Notes 2',
      'letter-body':'Letter to future self','wins-list':'My wins',
    };
    Object.entries(map).forEach(([k,label]) => {
      const v = fields[k];
      if (v && String(v).trim()) {
        lines.push(label.toUpperCase());
        lines.push(String(v).trim());
        lines.push('');
      }
    });
    lines.push('SHEDDING TRACKER');
    for (let i = 0; i < 6; i++) {
      const s = fields['shed-shedding-' + i], n = fields['shed-note-' + i];
      if (s || n) lines.push('  Month ' + (i+1) + ': ' + (s || '—') + (n ? ' | ' + n : ''));
    }
    lines.push('');
    lines.push('MEDICATION LOG');
    for (let i = 0; i < 7; i++) {
      const nm = fields['med-name-' + i], d = fields['med-dose-' + i];
      if (nm || d) lines.push('  ' + (nm || 'Med ' + (i+1)) + ': ' + (d || '—') + ' | Start: ' + (fields['med-start-' + i] || '—'));
    }
    lines.push('');
    lines.push(SEP);
    lines.push('Chiranjivi Notes® · v2.0 · For personal educational use only');
    lines.push('This companion does not replace professional medical advice.');
    const blob = new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'chiranjivi-hair-loss-export.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    Toast.show('Data exported — check your downloads');
  }
};

</script>
